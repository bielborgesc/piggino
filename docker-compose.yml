# docker-compose.yml
version: '3.8'

services:
  piggino-postgres:
    image: postgres:16-alpine
    container_name: piggino-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=piggino
      - POSTGRES_USER=piggino
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-piggino}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - piggino-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piggino -d piggino"]
      interval: 10s
      timeout: 5s
      retries: 5

  piggino-api:
    image: bielborgesc/piggino-api:latest
    container_name: piggino-api
    restart: unless-stopped
    depends_on:
      piggino-postgres:
        condition: service_healthy
    environment:
      - JwtSettings__Key=${JWT_KEY}
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__piggino-db=Host=piggino-postgres;Port=5432;Database=piggino;Username=piggino;Password=${POSTGRES_PASSWORD:-piggino}
    networks:
      - piggino-net

  piggino-frontend:
    image: bielborgesc/piggino-frontend:latest
    container_name: piggino-frontend
    restart: unless-stopped
    networks:
      - piggino-net

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - piggino-net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  piggino-net:
    driver: bridge
