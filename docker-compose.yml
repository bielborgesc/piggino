# docker-compose.yml

services:
  piggino-postgres:
    image: postgres:16-alpine
    container_name: piggino-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=piggino
      - POSTGRES_USER=piggino
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-piggino}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - piggino-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piggino -d piggino"]
      interval: 10s
      timeout: 5s
      retries: 5

  piggino-api:
    image: bielborgesc/piggino-api:latest
    container_name: piggino-api
    restart: unless-stopped
    depends_on:
      piggino-postgres:
        condition: service_healthy
    environment:
      - JwtSettings__Key=${JWT_KEY}
      - JwtSettings__Issuer=PigginoApi
      - JwtSettings__Audience=PigginoUsers
      - BotSettings__Secret=${BOT_SECRET}
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__piggino-db=Host=piggino-postgres;Port=5432;Database=piggino;Username=piggino;Password=${POSTGRES_PASSWORD:-piggino}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    volumes:
      - dataprotection_keys:/root/.aspnet/DataProtection-Keys
    networks:
      - piggino-net

  piggino-frontend:
    image: bielborgesc/piggino-frontend:latest
    container_name: piggino-frontend
    restart: unless-stopped
    networks:
      - piggino-net

  piggino-bot:
    build: ./bot
    container_name: piggino-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PIGGINO_API_URL=http://piggino-api:8080
      - BOT_SECRET=${BOT_SECRET}
    depends_on:
      piggino-api:
        condition: service_healthy
    networks:
      - piggino-net

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - piggino-net

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  dataprotection_keys:

networks:
  piggino-net:
    driver: bridge
