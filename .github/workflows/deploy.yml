name: Deploy Piggino to Digital Ocean

on:
  push:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore backend/Piggino.Api/Piggino.Api.csproj

      - name: Build backend
        run: dotnet build backend/Piggino.Api/Piggino.Api.csproj --no-restore -c Release

  build-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install bot dependencies
        run: npm install
        working-directory: ./bot

      - name: Build bot
        run: npm run build
        working-directory: ./bot

  build-and-push:
    needs: [build-backend, build-bot]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Piggino.Api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/piggino-api:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/piggino-frontend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Digital Ocean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,JWT_KEY,TELEGRAM_BOT_TOKEN,GEMINI_API_KEY,BOT_SECRET
          script: |
            cd ~/piggino
            git pull
            export POSTGRES_PASSWORD="${POSTGRES_PASSWORD}"
            export JWT_KEY="${JWT_KEY}"
            export TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN}"
            export GEMINI_API_KEY="${GEMINI_API_KEY}"
            export BOT_SECRET="${BOT_SECRET}"
            docker compose pull
            docker compose up -d --build
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_SECRET: ${{ secrets.BOT_SECRET }}

      - name: Verify deployment health
        run: |
          echo "Waiting for the API to become healthy..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://piggino.duckdns.org/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)."
              exit 0
            fi
            echo "Attempt $i: received HTTP $STATUS — retrying in 10 seconds..."
            sleep 10
          done
          echo "Deployment health check failed after 2 minutes."
          exit 1
